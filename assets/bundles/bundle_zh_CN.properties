unit.commonplace-velocity_d.details=残余的残骸，不过为什么他的残骸会被单独列出来呢？
unit.commonplace-velocity_s.details=残余过载形态，请尽量拖延时间，他将会因为能源过载而自爆
unit.commonplace-hidden.details=能略微操控风和雷。风会让企图靠近者不能如意，时不时吹出石块。
unit.commonplace-cave.description=无法被攻击，他将会给你一次考验。\n极难防御，请务必准备好大超修复和裂解，单位估计会死光，考验开启后几乎无法建东西。
unit.commonplace-cave.details=于时间长河中等待一切发生改变
unit.commonplace-hammer.description=T2空军，有点用吧，最好尽快杀死
unit.commonplace-buying.description=T3空军，这玩意最好快速杀死，他能释放挖掘者
